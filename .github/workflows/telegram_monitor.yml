name: Telegram Monitor

on:
  repository_dispatch:
    types: [trigger_monitor, board_updated]
  workflow_dispatch:

# 今誰かが実行中であれば、次の処理はそれが終わるまで順番待ちをします
concurrency:
  group: telegram-monitor-group
  cancel-in-progress: false

# ここで明示的にリポジトリへの書き込み権限を許可します
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run python telegram_monitor.py
        # ダウンロードに時間がかかる場合に備え、個別のステップにタイムアウトを設定します
        timeout-minutes: 15
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_URL: ${{ secrets.TARGET_URL }}
          # 追加: SecretsからEXCLUSION_URLを読み込み、環境変数として渡します
          EXCLUSION_URL: ${{ secrets.EXCLUSION_URL }}
        run: python telegram_monitor.py
